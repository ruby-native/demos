auth:
  oauth_paths:
    - /auth/google_oauth2
    - /auth/apple

appearance:
  tint_color: "#5C3D2E"
  background_color:
    light: "#FAF7F2"
    dark: "#1C1410"

tabs:
  - title: Menu
    path: /menu
    icons:
      ios: cup.and.saucer
      android: coffee
  - title: Orders
    path: /orders
    icons:
      ios: bag
      android: shopping_bag
  - title: Rewards
    path: /rewards
    icon: star
  - title: Account
    path: /account
    icon: person

screenshots:
  paths:
    - /menu
    - /orders
    - /rewards
    - /account

ruby_native:
  app_id: app_f3rgewxy
