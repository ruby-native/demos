app:
  mode: normal

appearance:
  tint_color: "#0d9488"
  background_color:
    light: "#f2f2f7"
    dark: "#000000"

tabs:
  - title: Today
    path: /today
    icons:
      ios: sun.max
      android: wb_sunny
  - title: Inbox
    path: /inbox
    icons:
      ios: tray
      android: inbox
    badge: true
  - title: Done
    path: /done
    icons:
      ios: checkmark.circle
      android: check_circle
  - title: Profile
    path: /profile
    icon: person
