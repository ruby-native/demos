app:
  mode: advanced
  name: Shelf
  bundle_id: com.masilotti.shelf.rubynative

appearance:
  tint_color: "#d97706"
  background_color:
    light: "#FFFBF5"
    dark: "#171210"
  splash:
    enabled: true
    spinner_color: "#FFFFFF"
    status_bar: light

tabs:
  - title: Library
    path: /books
    icons:
      ios: books.vertical
      android: menu_book
    auto_route: false
  - title: Discover
    path: /discover
    icons:
      ios: sparkles
      android: auto_awesome
  - title: Stats
    path: /stats
    icons:
      ios: chart.bar
      android: bar_chart
  - title: Profile
    path: /profile
    icons:
      ios: person
      android: person
